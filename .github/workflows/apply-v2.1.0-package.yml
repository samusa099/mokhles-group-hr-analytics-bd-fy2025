name: Apply v2.1.0 BI Package

on:
  push:
    branches:
      - release-v2.1.0-bi-compatibility
    paths:
      - deploy/v2.1.0/GO

permissions:
  contents: write

jobs:
  apply-package:
    runs-on: ubuntu-latest

    steps:
      - name: Check out release branch
        uses: actions/checkout@v4
        with:
          ref: release-v2.1.0-bi-compatibility
          fetch-depth: 0

      - name: Rebuild and extract update package
        shell: bash
        run: |
          set -euo pipefail
          cat deploy/v2.1.0/chunk_*.b64 > /tmp/mokhles-v210.b64
          base64 --decode /tmp/mokhles-v210.b64 > /tmp/mokhles-v210.zip
          unzip -o /tmp/mokhles-v210.zip -d .
          rm -rf deploy/v2.1.0
          rm -f .github/workflows/apply-v2.1.0-package.yml

      - name: Commit extracted BI update
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Assemble v2.1.0 BI compatibility update [skip ci]"
          git push origin release-v2.1.0-bi-compatibility

name: Python Dependency Security Audit

on:
  push:
    branches: ["main"]
    paths:
      - "requirements.txt"
      - "pyproject.toml"
      - ".github/workflows/dependency-audit.yml"
  pull_request:
    branches: ["main"]
    paths:
      - "requirements.txt"
      - "pyproject.toml"
      - ".github/workflows/dependency-audit.yml"
  schedule:
    - cron: "30 3 * * 1"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: dependency-audit-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  audit:
    runs-on: ubuntu-24.04
    timeout-minutes: 15

    steps:
      - name: Check out repository without persisted credentials
        shell: bash
        run: |
          set -euo pipefail
          git init .
          git remote add origin "https://github.com/${GITHUB_REPOSITORY}.git"
          git -c protocol.version=2 fetch --no-tags --depth=1 origin "${GITHUB_REF}"
          git checkout --detach FETCH_HEAD

      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.12"

      - name: Audit Python dependencies
        uses: pypa/gh-action-pip-audit@1220774d901786e6f652ae159f7b6bc8fea6d266 # v1.1.0
        with:
          inputs: requirements.txt
          vulnerability-service: PyPI
